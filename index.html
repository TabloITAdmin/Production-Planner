<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 20px 10px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .menu a {
      display: block;
      padding: 12px;
      margin: 6px 0;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    .menu a:hover {
      background: #34495e;
    }

    /* Main Content */
    .main {
      flex: 1;
      background: #ecf0f1;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      background: #3498db;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📊 Dashboard</h2>
    <div class="menu">
      <a href="#" onclick="loadPage('production-planner.html')">🛠 Production Planner</a>
      <a href="#" onclick="loadPage('purchase-orders.html')">📦 Purchase Orders</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="main-header" id="pageTitle">Welcome</div>
    <iframe id="mainFrame" src=""></iframe>
  </div>

  <script>
    function loadPage(page) {
      document.getElementById("mainFrame").src = page;
      document.getElementById("pageTitle").innerText =
        page.includes("production") ? "🛠 Production Planner" :
        page.includes("purchase") ? "📦 Purchase Orders" :
        "Dashboard";
    }
  </script>
</body>
</html>
